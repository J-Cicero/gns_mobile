<ion-content class="bg-black">
  <div class="flex flex-col min-h-screen relative overflow-hidden">
    
    <!-- Top Header Overlay -->
    <div class="absolute top-0 inset-x-0 p-6 z-20 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
      <button (click)="cancelScan()" class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white active:bg-white/30 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
      <h2 class="text-white font-bold tracking-widest uppercase text-xs">Paiement</h2>
      <div class="w-10"></div> <!-- Spacer -->
    </div>

    <!-- Scanner View (Camera Placeholder) -->
    <div *ngIf="isScanning" class="flex-1 flex flex-col items-center justify-center relative bg-slate-900">
      
      <!-- Simulated Camera View Background -->
      <div class="absolute inset-0 bg-slate-800 opacity-50 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjNDc1NTY5IiBmaWxsLW9wYWNpdHk9IjAuMSI+PC9yZWN0Pgo8cGF0aCBkPSJNMCAwTDggOFpNOCAwTDAgOFoiIHN0cm9rZT0iIzMzNDE1NSIgc3Ryb2tlLXdpZHRoPSIxIiBvcGFjaXR5PSIwLjMiPjwvcGF0aD4KPC9zdmc+')]"></div>

      <!-- Scanner Frame -->
      <div class="relative w-64 h-64 z-10" (click)="simulateScan()">
        <!-- Corners -->
        <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-indigo-500 rounded-tl-xl"></div>
        <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-indigo-500 rounded-tr-xl"></div>
        <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-indigo-500 rounded-bl-xl"></div>
        <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-indigo-500 rounded-br-xl"></div>
        
        <!-- Scanning Line Animation -->
        <div class="absolute inset-x-0 top-0 h-0.5 bg-indigo-500 shadow-[0_0_8px_2px_rgba(99,102,241,0.8)] animate-[scan_2s_ease-in-out_infinite]"></div>
      </div>

      <p class="text-white/70 mt-8 text-sm font-medium z-10 px-8 text-center">
        Pointez votre caméra vers le QR Code du marchand pour effectuer le paiement.
      </p>

      <!-- Formulaire de saisie manuelle (Fallback si la caméra ne marche pas) -->
      <div class="z-10 mt-8 w-full px-8 max-w-sm">
        <div class="bg-slate-800/80 backdrop-blur p-4 rounded-2xl border border-slate-700">
          <p class="text-xs text-slate-400 font-bold uppercase tracking-wider mb-3 text-center">Saisie Manuelle (Test)</p>
          <input type="text" [(ngModel)]="manualMerchantId" placeholder="ID de la boutique" class="w-full mb-3 px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:border-indigo-500 focus:outline-none">
          <input type="number" [(ngModel)]="manualAmount" placeholder="Montant" class="w-full mb-3 px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:border-indigo-500 focus:outline-none">
          <button (click)="simulateScan()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-colors">
            Valider
          </button>
        </div>
      </div>
    </div>

    <!-- Scan Result & Payment Confirmation -->
    <div *ngIf="!isScanning && scanResult" class="absolute inset-0 z-30 bg-slate-50 dark:bg-slate-900 flex flex-col p-6 animate-fade-in-up">
      
      <div class="flex-1 flex flex-col items-center justify-center">
        <div class="w-20 h-20 bg-indigo-100 dark:bg-indigo-900/30 rounded-full flex items-center justify-center mb-6 shadow-inner border-4 border-white dark:border-slate-800">
          <svg class="w-10 h-10 text-indigo-600 dark:text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
        </div>
        
        <p class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Paiement vers</p>
        <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white text-center mb-1 tracking-tight">{{ scanResult.merchantName }}</h2>
        <p class="text-xs text-slate-400 font-mono mb-8">ID: {{ scanResult.merchantId }}</p>

        <div class="w-full bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700 mb-8">
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2 text-center">Montant à payer</label>
          <div class="relative flex items-center justify-center">
            <input type="number" [(ngModel)]="scanResult.amount" 
              class="w-full text-center text-4xl font-black bg-transparent border-b-2 border-slate-200 dark:border-slate-700 focus:border-indigo-500 outline-none pb-2 text-slate-900 dark:text-white transition-colors">
            <span class="absolute right-4 text-xl font-bold text-slate-400 bottom-3">FCFA</span>
          </div>
        </div>

      </div>

      <div class="flex space-x-3 w-full pb-6">
        <button (click)="restartScan()" class="flex-1 py-4 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold rounded-2xl active:bg-slate-300 dark:active:bg-slate-700 transition-colors">
          Annuler
        </button>
        <button (click)="confirmPayment()" class="flex-[2] py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-500/30 active:scale-[0.98] transition-all">
          Confirmer
        </button>
      </div>

    </div>

  </div>
</ion-content>

<style>
  @keyframes scan {
    0%, 100% { top: 0; }
    50% { top: 100%; }
  }
</style>
