<ion-header class="ion-no-border premium-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/student" icon="arrow-back-outline" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Mon Profil StudCash</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="premium-dark-bg" scroll-y="true">
  <div class="profile-wrapper fade-in">

    <div class="user-main-card">
      <div class="avatar-container">
        <div class="initials-avatar">
          {{ studentProfile.nom.charAt(0) }}
        </div>
      </div>

      <h2 class="user-name">{{ studentProfile.nom }}</h2>
      <p class="user-meta">{{ studentProfile.niveau }} — {{ studentProfile.anneeScolaire }}</p>
    </div>

    <div class="account-menu">
      <div class="menu-item">
        <div class="menu-left">
          <ion-icon [name]="isDarkMode ? 'sunny-outline' : 'moon-outline'" class="menu-icon"></ion-icon>
          <span>{{ isDarkMode ? 'Passer au Mode Clair' : 'Passer au Mode Sombre' }}</span>
        </div>
        <div class="menu-right">
           <ion-toggle [checked]="isDarkMode" (ionChange)="toggleTheme()"></ion-toggle>
        </div>
      </div>

      <div class="menu-item logout" (click)="deconnexion()">
        <div class="menu-left">
          <ion-icon name="log-out-outline" class="menu-icon"></ion-icon>
          <span>Se déconnecter</span>
        </div>
      </div>
    </div>

  </div>
</ion-content>
