<ion-header class="ion-no-border premium-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/merchant" icon="arrow-back-outline" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Nouvel Encaissement</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="premium-dark-bg">
  <div class="caisse-wrapper">

    <!-- ETAPE 1 : SAISIE DU MONTANT -->
    <div *ngIf="step === 'AMOUNT'" class="amount-step fade-in-up">
      
      <div class="amount-display">
        <p>Montant à encaisser</p>
        <h1>{{ montantSaisi | number:'1.0-0' }} <span>FCFA</span></h1>
      </div>

      <div class="numpad-grid">
        <button (click)="ajouterChiffre('1')">1</button>
        <button (click)="ajouterChiffre('2')">2</button>
        <button (click)="ajouterChiffre('3')">3</button>
        <button (click)="ajouterChiffre('4')">4</button>
        <button (click)="ajouterChiffre('5')">5</button>
        <button (click)="ajouterChiffre('6')">6</button>
        <button (click)="ajouterChiffre('7')">7</button>
        <button (click)="ajouterChiffre('8')">8</button>
        <button (click)="ajouterChiffre('9')">9</button>
        <button class="empty"></button>
        <button (click)="ajouterChiffre('0')">0</button>
        <button (click)="supprimerChiffre()" class="action-btn"><ion-icon name="backspace-outline"></ion-icon></button>
      </div>

      <div class="action-buttons mt-8">
        <ion-button expand="block" class="premium-btn primary-btn w-full" (click)="genererQR()">
          Générer QR Code <ion-icon name="qr-code-outline" slot="end"></ion-icon>
        </ion-button>
      </div>
    </div>

    <!-- ETAPE 2 : AFFICHAGE DU QR CODE -->
    <div *ngIf="step === 'QR'" class="qr-step fade-in-up flex flex-col items-center justify-center pt-10">
      
      <div class="bg-white p-6 rounded-3xl shadow-xl mb-8">
        <qrcode [qrdata]="qrData" [width]="256" [errorCorrectionLevel]="'M'"></qrcode>
      </div>

      <h2 class="text-white text-2xl font-bold mb-2">Montant : {{ montantSaisi }} FCFA</h2>
      <p class="text-slate-400 text-center px-6 mb-10">
        Demandez à l'étudiant de scanner ce code QR depuis son application pour valider le paiement.
      </p>

      <div class="action-buttons w-full px-6">
        <ion-button expand="block" fill="clear" color="medium" class="w-full" (click)="annulerPaiement()">
          Annuler et retourner
        </ion-button>
      </div>
    </div>

  </div>
</ion-content>
