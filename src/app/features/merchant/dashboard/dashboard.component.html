<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Tableau de Bord</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding merchant-content">
  <div class="stats-grid">
    <div class="stat-card quota-card">
      <div class="stat-header">
        <ion-icon name="wallet-outline"></ion-icon>
        <span>Quota Restant</span>
      </div>
      <h2>{{ quotaRestant | currency:'XOF':'symbol':'1.0-0' }}</h2>
      <div class="progress-bar-container">
        <div class="progress-bar" [style.width]="pourcentageUtilise + '%'"></div>
      </div>
      <p class="stat-subtext">{{ pourcentageUtilise | number:'1.0-0' }}% utilisé sur {{ quotaInitial | currency:'XOF':'symbol':'1.0-0' }}</p>
    </div>

    <div class="stat-card sales-card">
      <div class="stat-header">
        <ion-icon name="trending-up-outline"></ion-icon>
        <span>Ventes du Jour</span>
      </div>
      <h2>{{ ventesJour | currency:'XOF':'symbol':'1.0-0' }}</h2>
      <p class="stat-subtext text-success">
        <ion-icon name="checkmark-circle-outline"></ion-icon> En cours
      </p>
    </div>
  </div>
</ion-content>
