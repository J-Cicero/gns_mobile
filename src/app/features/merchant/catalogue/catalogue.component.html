<ion-header class="ion-no-border premium-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/merchant/dashboard" icon="arrow-back-outline"></ion-back-button>
    </ion-buttons>
    <ion-title>Mon Catalogue</ion-title>
    <ion-buttons slot="end">
      <ion-button>
        <ion-icon name="add-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="premium-dark-bg">
  <div class="page-wrapper">
    <h3 class="section-title">Articles disponibles</h3>
    
    <div *ngFor="let item of produits" class="product-card">
      <div class="product-info">
        <h4>{{ item.nom }}</h4>
        <p>{{ item.prix | number:'1.0-0' }} FCFA</p>
      </div>
      <ion-toggle [checked]="item.disponible" color="primary"></ion-toggle>
    </div>
  </div>
</ion-content>
