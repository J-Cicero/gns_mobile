<ion-content class="bg-slate-50 dark:bg-slate-900">
  <div class="flex flex-col min-h-screen px-6 py-12">
    <!-- Header -->
    <div class="mb-10 text-center animate-fade-in-up">
      <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Devenir Partenaire</h1>
      <p class="text-slate-500 dark:text-slate-400 mt-2 font-medium">Rejoignez GNS Merchant</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl flex items-start animate-fade-in">
      <p class="text-sm font-bold text-red-700 dark:text-red-400">{{ errorMessage }}</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-4 flex-1 animate-fade-in-up">
      
      <div>
        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Nom de la Boutique</label>
        <input type="text" [(ngModel)]="merchantData.businessName" name="businessName" required
          class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="Ma Boutique">
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">RCCM / N° d'enregistrement</label>
        <input type="text" [(ngModel)]="merchantData.registrationNumber" name="registrationNumber"
          class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="TG-LOM-...">
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Description / Adresse</label>
        <input type="text" [(ngModel)]="merchantData.description" name="description" required
          class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="Quartier, Avenue...">
      </div>

      <div class="p-4 bg-indigo-50 dark:bg-indigo-900/20 rounded-2xl space-y-4">
        <h3 class="text-sm font-bold text-indigo-700 dark:text-indigo-400 flex items-center">
          <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>
          Informations Bancaires
        </h3>

        <div>
          <label class="block text-[10px] font-black text-indigo-400 dark:text-indigo-500 uppercase tracking-widest mb-1 ml-1">Banque Partenaire</label>
          <select [(ngModel)]="merchantData.bankTrackingId" name="bankTrackingId" required
            class="w-full px-4 py-2 bg-white dark:bg-slate-800 border border-indigo-100 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white">
            <option value="" disabled selected>Choisir une banque</option>
            <option *ngFor="let bank of banks" [value]="bank.trackingId">{{ bank.nom }}</option>
          </select>
        </div>

        <div>
          <label class="block text-[10px] font-black text-indigo-400 dark:text-indigo-500 uppercase tracking-widest mb-1 ml-1">Numéro de Compte</label>
          <input type="text" [(ngModel)]="merchantData.accountNumber" name="accountNumber" required
            class="w-full px-4 py-2 bg-white dark:bg-slate-800 border border-indigo-100 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white" placeholder="00000 00000 00000000000 00">
        </div>

        <div class="border-2 border-dashed border-indigo-200 dark:border-slate-700 rounded-xl p-4 text-center bg-white/50 dark:bg-slate-800/50">
          <label class="cursor-pointer block">
            <span class="text-xs font-bold text-indigo-600 dark:text-indigo-400">{{ selectedRib ? selectedRib.name : 'Uploader votre RIB (Image ou PDF)' }}</span>
            <input type="file" class="sr-only" (change)="onFileSelected($event)" accept="image/*,.pdf">
          </label>
        </div>
      </div>

      <div class="flex gap-4">
        <div class="flex-1">
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Nom</label>
          <input type="text" [(ngModel)]="merchantData.lastName" name="lastName"
            class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="Nom">
        </div>
        <div class="flex-1">
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Prénom</label>
          <input type="text" [(ngModel)]="merchantData.firstName" name="firstName"
            class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="Prénom">
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Email</label>
        <input type="email" [(ngModel)]="merchantData.email" name="email" required
          class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="contact@boutique.tg">
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Mot de passe</label>
        <input type="password" [(ngModel)]="merchantData.password" name="password" required
          class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="••••••••">
      </div>

      <div class="pt-6">
        <button type="submit" [disabled]="isSubmitting" 
          class="w-full py-4 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/30 transition-all">
          <span *ngIf="!isSubmitting">Créer mon compte marchand</span>
          <span *ngIf="isSubmitting">Création en cours...</span>
        </button>
      </div>

    </form>
    
    <div class="mt-8 text-center">
      <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Déjà partenaire ? <a routerLink="/auth/login" class="text-indigo-600 dark:text-indigo-400 font-bold hover:underline">Se connecter</a></p>
    </div>
  </div>
</ion-content>
