<ion-content class="bg-slate-50 dark:bg-slate-900">
  <div class="flex flex-col min-h-screen px-6 py-12">
    <!-- Header -->
    <div class="mb-10 text-center animate-fade-in-up">
      <div class="w-16 h-16 mx-auto bg-indigo-100 dark:bg-indigo-900/30 rounded-2xl flex items-center justify-center mb-4 shadow-inner">
        <svg class="w-8 h-8 text-indigo-600 dark:text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Votre Boutique</h1>
      <p class="text-slate-500 dark:text-slate-400 mt-2 font-medium">Localisez et détaillez votre point de vente.</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl flex items-start animate-fade-in">
      <p class="text-sm font-bold text-red-700 dark:text-red-400">{{ errorMessage }}</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-4 flex-1 animate-fade-in-up" style="animation-delay: 100ms;">
      
      <div>
        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Nom du point de vente</label>
        <input type="text" [(ngModel)]="boutiqueData.nom" name="nom" required
          class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="Ex: Boutique Principale">
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Adresse (Texte)</label>
        <input type="text" [(ngModel)]="boutiqueData.adresse" name="adresse" required
          class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="Quartier, Rue...">
      </div>

      <div class="flex gap-4">
        <div class="flex-1">
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Catégorie</label>
          <input type="text" [(ngModel)]="boutiqueData.categorie" name="categorie"
            class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="Restauration, Librairie...">
        </div>
        <div class="flex-1">
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Téléphone</label>
          <input type="text" [(ngModel)]="boutiqueData.telephone" name="telephone"
            class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="+228 ...">
        </div>
      </div>

      <!-- GPS Capture -->
      <div class="pt-4">
        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Coordonnées GPS</label>
        <div class="flex items-center space-x-3">
          <button type="button" (click)="getCurrentLocation()" [disabled]="isLocating"
            class="py-3 px-4 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 text-indigo-700 dark:text-indigo-300 font-bold rounded-xl transition-all flex items-center">
            <svg *ngIf="isLocating" class="animate-spin mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <svg *ngIf="!isLocating" class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            {{ boutiqueData.latitude ? 'Actualiser' : 'Capturer la position' }}
          </button>
          
          <div *ngIf="boutiqueData.latitude" class="text-xs font-mono text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-800 px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg">
            Lat: {{ boutiqueData.latitude | number:'1.1-4' }}<br>
            Lng: {{ boutiqueData.longitude | number:'1.1-4' }}
          </div>
        </div>
        <p *ngIf="!boutiqueData.latitude" class="text-xs text-slate-400 mt-2 ml-1">Facultatif mais recommandé pour être visible sur la carte.</p>
      </div>

      <div class="pt-8">
        <button type="submit" [disabled]="isSubmitting" 
          class="w-full py-4 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/30 transition-all disabled:opacity-70 flex justify-center items-center">
          <span *ngIf="!isSubmitting">Terminer l'inscription</span>
          <span *ngIf="isSubmitting">Enregistrement...</span>
        </button>
      </div>
    </form>
    
    <div class="mt-6">
      <!-- Progress Indicator -->
      <div class="flex justify-center space-x-2">
        <div class="w-8 h-2 bg-indigo-600 rounded-full"></div>
        <div class="w-8 h-2 bg-indigo-600 rounded-full"></div>
        <div class="w-8 h-2 bg-indigo-600 rounded-full"></div>
      </div>
    </div>
  </div>
</ion-content>
