<ion-content class="bg-slate-50 dark:bg-slate-900">
  <div class="flex flex-col min-h-screen px-6 py-12">
    <!-- Header -->
    <div class="mb-10 text-center animate-fade-in-up">
      <div class="w-16 h-16 mx-auto bg-indigo-100 dark:bg-indigo-900/30 rounded-2xl flex items-center justify-center mb-4 shadow-inner">
        <svg class="w-8 h-8 text-indigo-600 dark:text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Vérification KYC</h1>
      <p class="text-slate-500 dark:text-slate-400 mt-2 font-medium">Uploadez vos documents d'entreprise.</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl flex items-start animate-fade-in">
      <p class="text-sm font-bold text-red-700 dark:text-red-400">{{ errorMessage }}</p>
    </div>

    <!-- Upload Form -->
    <div class="space-y-6 flex-1 animate-fade-in-up" style="animation-delay: 100ms;">
      
      <div>
        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Type de Document</label>
        <select [(ngModel)]="documentType" class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white">
          <option value="REGISTRE_COMMERCE">Registre de Commerce (RCCM)</option>
          <option value="CARTE_IDENTITE">Carte d'Identité / Passeport</option>
          <option value="RIB">Relevé d'Identité Bancaire (RIB)</option>
        </select>
      </div>

      <div class="border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-2xl p-8 text-center bg-white dark:bg-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
        <svg class="mx-auto h-12 w-12 text-slate-400 mb-4" stroke="currentColor" fill="none" viewBox="0 0 48 48">
          <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <div class="flex text-sm text-slate-600 dark:text-slate-400 justify-center">
          <label class="relative cursor-pointer bg-transparent rounded-md font-medium text-indigo-600 dark:text-indigo-400 hover:text-indigo-500 focus-within:outline-none">
            <span>Uploader un fichier</span>
            <input type="file" class="sr-only" (change)="onFileSelected($event)" accept="image/*,.pdf">
          </label>
          <p class="pl-1">ou glissez-déposez</p>
        </div>
        <p class="text-xs text-slate-500 mt-2">PNG, JPG, PDF jusqu'à 5MB</p>

        <!-- Nom du fichier sélectionné -->
        <div *ngIf="selectedFile" class="mt-4 p-3 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-700 dark:text-indigo-300 rounded-lg text-sm font-medium flex items-center justify-center">
          <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          {{ selectedFile.name }}
        </div>
      </div>

      <div class="pt-6">
        <button (click)="uploadDocument()" [disabled]="isUploading || !selectedFile" 
          class="w-full py-4 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/30 transition-all disabled:opacity-70 flex justify-center items-center">
          <svg *ngIf="isUploading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span *ngIf="!isUploading">Envoyer et Continuer</span>
          <span *ngIf="isUploading">Envoi en cours...</span>
        </button>
      </div>
    </div>
    
    <div class="mt-6">
      <!-- Progress Indicator -->
      <div class="flex justify-center space-x-2">
        <div class="w-8 h-2 bg-indigo-600 rounded-full"></div>
        <div class="w-8 h-2 bg-indigo-600 rounded-full"></div>
        <div class="w-8 h-2 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
      </div>
    </div>
  </div>
</ion-content>
