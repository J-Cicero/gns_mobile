<ion-content class="bg-slate-900">
  <div class="flex flex-col min-h-screen px-6 py-12 bg-slate-900">
    <!-- Header -->
    <div class="mb-8 text-center animate-fade-in-up">
      <div class="w-16 h-16 mx-auto bg-blue-600 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-blue-500/30">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-white tracking-tight">Inscription GNS</h1>
      <p class="text-slate-400 mt-2 font-medium">Étape {{ currentStep }} sur 3</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-900/20 border border-red-800 rounded-xl flex items-start animate-fade-in">
      <svg class="w-5 h-5 text-red-500 mt-0.5 mr-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="text-sm font-bold text-red-400">{{ errorMessage }}</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-5 flex-1 animate-fade-in-up">
      
      <!-- STEP 1: Informations Personnelles -->
      <div *ngIf="currentStep === 1" class="space-y-5">
        <h3 class="text-lg font-bold text-white mb-4 border-b border-slate-700 pb-2">Informations Personnelles</h3>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Nom</label>
            <input type="text" [(ngModel)]="registrationData.nom" name="nom" required
              class="w-full px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-white placeholder-slate-500" 
              placeholder="Ex: DOSSO">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Prénom</label>
            <input type="text" [(ngModel)]="registrationData.prenom" name="prenom" required
              class="w-full px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-white placeholder-slate-500" 
              placeholder="Ex: Marc">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Email</label>
          <input type="email" [(ngModel)]="registrationData.email" name="email" required
            class="w-full px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-white placeholder-slate-500" 
            placeholder="etudiant@exemple.com">
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Téléphone</label>
          <input type="tel" [(ngModel)]="registrationData.telephone" name="telephone"
            class="w-full px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-white placeholder-slate-500" 
            placeholder="+228 90 00 00 00">
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Date de Naissance</label>
          <input type="date" [(ngModel)]="registrationData.birthDate" name="birthDate" required
            class="w-full px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-white">
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Lieu de Naissance</label>
          <input type="text" [(ngModel)]="registrationData.birthPlace" name="birthPlace" required
            class="w-full px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-white placeholder-slate-500" 
            placeholder="Ex: Lomé">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Mot de passe</label>
            <input type="password" [(ngModel)]="registrationData.motDePasse" name="motDePasse" required
              class="w-full px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-white placeholder-slate-500" 
              placeholder="••••••••">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Code PIN (4 ch.)</label>
            <input type="password" [(ngModel)]="registrationData.pinCode" name="pinCode" required minlength="4" maxlength="4" inputmode="numeric" pattern="[0-9]{4}"
              class="w-full px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-white placeholder-slate-500" 
              placeholder="••••">
          </div>
        </div>
      </div>

      <!-- STEP 2: Informations Bancaires -->
      <div *ngIf="currentStep === 2" class="space-y-5 animate-fade-in">
        <h3 class="text-lg font-bold text-white mb-4 border-b border-slate-700 pb-2">Informations Bancaires</h3>
        <p class="text-sm text-slate-400 mb-4">Ces informations ne vous seront demandées qu'une seule fois pour la création de votre compte GNS.</p>
        
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Banque</label>
          <select [(ngModel)]="registrationData.bankTrackingId" name="bankTrackingId"
            class="w-full px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-white">
            <option value="">Sélectionner une banque (Optionnel)</option>
            <option *ngFor="let banque of banques" [value]="banque.trackingId">{{ banque.name }}</option>
          </select>
        </div>

        <div *ngIf="registrationData.bankTrackingId">
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Numéro de Compte</label>
          <input type="text" [(ngModel)]="registrationData.accountNumber" name="accountNumber" required
            class="w-full px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-white placeholder-slate-500" 
            placeholder="Ex: 0123456789">
        </div>

        <div *ngIf="registrationData.bankTrackingId">
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">RIB (Image/PDF)</label>
          <input type="file" (change)="onRibSelected($event)" accept=".pdf,image/*" required
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-900 file:text-blue-200">
        </div>

        <div *ngIf="registrationData.bankTrackingId">
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Mandat Signé (Image/PDF)</label>
          <input type="file" (change)="onMandatSelected($event)" accept=".pdf,image/*" required
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-900 file:text-blue-200">
        </div>
      </div>

      <!-- STEP 3: Informations Académiques -->
      <div *ngIf="currentStep === 3" class="space-y-5 animate-fade-in">
        <h3 class="text-lg font-bold text-white mb-4 border-b border-slate-700 pb-2">Informations Académiques</h3>
        
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Matricule Étudiant</label>
          <input type="text" [(ngModel)]="registrationData.studentIdNumber" name="studentIdNumber" required
            class="w-full px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-white placeholder-slate-500" 
            placeholder="Ex: 20230001">
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Université</label>
          <select [(ngModel)]="registrationData.universiteTrackingId" name="universiteTrackingId" required
            class="w-full px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-white">
            <option value="" disabled>Sélectionner votre université</option>
            <option *ngFor="let univ of universites" [value]="univ.trackingId">{{ univ.fullName }}</option>
          </select>
        </div>
      </div>

      <!-- Navigation Buttons -->
      <div class="pt-6 flex space-x-3">
        <button *ngIf="currentStep > 1" type="button" (click)="prevStep()" 
          class="w-1/3 py-4 px-4 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl border border-slate-700 transition-all active:scale-[0.98]">
          Retour
        </button>
        
        <button *ngIf="currentStep < 3" type="button" (click)="nextStep()" 
          class="flex-1 py-4 px-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98]">
          Continuer
        </button>

        <button *ngIf="currentStep === 3" type="submit" [disabled]="isSubmitting" 
          class="flex-1 py-4 px-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98] disabled:opacity-70 flex justify-center items-center">
          <svg *ngIf="isSubmitting" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span *ngIf="!isSubmitting">Finaliser l'inscription</span>
          <span *ngIf="isSubmitting">Création en cours...</span>
        </button>
      </div>
    </form>

    <div class="mt-8 text-center" *ngIf="currentStep === 1">
      <p class="text-sm text-slate-400">
        Déjà un compte ? 
        <a (click)="goToLogin()" class="font-bold text-blue-500 hover:text-blue-400 hover:underline" style="cursor: pointer;">Connectez-vous</a>
      </p>
    </div>
  </div>
</ion-content>
