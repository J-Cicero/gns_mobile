<ion-content class="bg-slate-50 dark:bg-slate-900">
  <div class="flex flex-col min-h-screen px-6 py-12">
    <!-- Header -->
    <div class="mb-10 text-center animate-fade-in-up">
      <div class="w-16 h-16 mx-auto bg-indigo-100 dark:bg-indigo-900/30 rounded-2xl flex items-center justify-center mb-4 shadow-inner">
        <svg class="w-8 h-8 text-indigo-600 dark:text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path d="M12 14l9-5-9-5-9 5 9 5z" />
          <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Parcours Académique</h1>
      <p class="text-slate-500 dark:text-slate-400 mt-2 font-medium">Renseignez vos informations universitaires.</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl flex items-start animate-fade-in">
      <svg class="w-5 h-5 text-red-500 mt-0.5 mr-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="text-sm font-bold text-red-700 dark:text-red-400">{{ errorMessage }}</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-5 flex-1 animate-fade-in-up" style="animation-delay: 100ms;">
      
      <div>
        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Niveau d'Étude</label>
        <select [(ngModel)]="enrollmentData.niveauEtude" name="niveauEtude" required
          class="w-full px-4 py-3.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-900 dark:text-white appearance-none">
          <option value="" disabled selected>Sélectionner un niveau</option>
          <option value="L1_ANNEE">Licence 1</option>
          <option value="L2_ANNEE">Licence 2</option>
          <option value="L3_ANNEE">Licence 3</option>
          <option value="L4_ANNEE">Master 1</option>
          <option value="L5_ANNEE">Master 2</option>
        </select>
      </div>

      <div class="pt-6">
        <button type="submit" [disabled]="isSubmitting" 
          class="w-full py-4 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/30 transition-all active:scale-[0.98] disabled:opacity-70 flex justify-center items-center">
          <svg *ngIf="isSubmitting" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span *ngIf="!isSubmitting">Continuer</span>
          <span *ngIf="isSubmitting">Vérification en cours...</span>
        </button>
      </div>

    </form>
    
    <div class="mt-6">
      <!-- Progress Indicator -->
      <div class="flex justify-center space-x-2">
        <div class="w-8 h-2 bg-indigo-600 rounded-full"></div>
        <div class="w-8 h-2 bg-indigo-600 rounded-full"></div>
        <div class="w-8 h-2 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
      </div>
    </div>
  </div>
</ion-content>
