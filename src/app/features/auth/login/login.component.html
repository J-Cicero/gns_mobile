<div class="ion-page">
<ion-content scroll-y="true">
  <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-blue-900 p-4">
    <div class="w-full max-w-sm bg-white/10 backdrop-blur-lg rounded-2xl p-8 border border-white/20 shadow-2xl animate-fade-in-up">
      
      <div class="text-center mb-8 flex flex-col items-center">
        <img src="assets/logos/logo-studcash-1.png" alt="studCASH Logo" class="h-32 w-auto mb-4 object-contain mix-blend-screen" style="filter: invert(1) hue-rotate(180deg) brightness(1.2);">
        <p class="text-blue-200">Connectez-vous à votre espace étudiant</p>
      </div>

      <div class="space-y-6">
        
        <div *ngIf="errorMessage" class="p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-100 text-sm flex items-start gap-2">
          <ion-icon name="alert-circle" class="text-xl mt-0.5 shrink-0"></ion-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <div>
          <label class="block text-sm font-medium text-blue-100 mb-2">Identifiant</label>
          <input type="email" [(ngModel)]="credentials.email" placeholder="etudiant@exemple.com"
                 class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium placeholder-white/30">
        </div>

        <div>
          <label class="block text-sm font-medium text-blue-100 mb-2">Mot de passe</label>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="credentials.password" placeholder="••••••••"
                   class="w-full pl-4 pr-11 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium placeholder-white/30">
            <div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-white/50 hover:text-white z-10 transition-colors" (click)="togglePasswordVisibility()">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" class="text-xl"></ion-icon>
            </div>
          </div>
        </div>

        <button (click)="onLogin()" [disabled]="isLoading" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none flex items-center justify-center gap-2">
          <div *ngIf="isLoading" class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
          <span *ngIf="!isLoading">Se connecter</span>
          <ion-icon *ngIf="!isLoading" name="arrow-forward" class="text-xl"></ion-icon>
        </button>
      </div>
      
      <div class="mt-6 flex flex-col gap-4 text-center">
        <a class="text-blue-300 hover:text-white text-sm cursor-pointer transition-colors">Mot de passe oublié ?</a>
        <p class="text-slate-400 text-sm">
          Pas encore de compte ?
          <a routerLink="/onboarding/registration" routerDirection="forward" class="font-bold text-blue-400 hover:text-blue-300 cursor-pointer transition-colors">Créer un compte</a>
        </p>
      </div>
    </div>
  </div>
</ion-content>
</div>
