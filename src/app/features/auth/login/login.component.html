<ion-content scroll-y="true" class="premium-auth-content" style="--background: var(--ion-background-color, #ffffff);">
  <div class="auth-wrapper">

    <div class="brand-section">
      <div class="premium-logo flex justify-center">
        <img src="assets/logos/logo-studcash-1.png" alt="studCASH Logo" class="mix-blend-multiply" style="height: 120px; width: auto; object-fit: contain;">
      </div>
      <p class="brand-tagline">Gérez vos finances en toute liberté</p>
    </div>

    <div class="card-form-section">

      <div class="input-glow-wrapper">
        <ion-item class="premium-input" lines="none">
          <ion-icon name="person-outline" slot="start" class="input-icon"></ion-icon>
          <ion-input type="email" label="Email" labelPlacement="floating" [(ngModel)]="credentials.email">
          </ion-input>
        </ion-item>
      </div>

      <div class="input-glow-wrapper">
        <ion-item class="premium-input" lines="none">
          <ion-icon name="lock-closed-outline" slot="start" class="input-icon"></ion-icon>
          <ion-input [type]="showPassword ? 'text' : 'password'" label="Mot de passe" labelPlacement="floating" [(ngModel)]="credentials.password">
          </ion-input>
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" slot="end" class="input-icon" style="cursor: pointer; z-index: 10;" (click)="togglePasswordVisibility()"></ion-icon>
        </ion-item>
      </div>

      <div class="forgot-link-container">
        <a class="forgot-link">Mot de passe oublié ?</a>
      </div>

      <div *ngIf="errorMessage" class="premium-error-box">
        <ion-icon name="alert-circle"></ion-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <ion-button expand="block" class="premium-btn" (click)="onLogin()" [disabled]="isLoading">
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        <span *ngIf="!isLoading">Se connecter <ion-icon name="arrow-forward" slot="end"></ion-icon></span>
      </ion-button>

      <div class="switch-auth-link">
        <p>Pas encore de compte ? <a (click)="goToRegister()" style="cursor: pointer;">Créer un compte</a></p>
      </div>

    </div>

  </div>
</ion-content>
