<ion-app>
  <ion-split-pane contentId="main-content" [disabled]="!showMenu">
    <ion-menu contentId="main-content" type="overlay" class="premium-menu" [disabled]="!showMenu">
      <ion-content>
        <ion-list id="inbox-list">
          <ion-list-header>
            <div class="brand-header">
              <ion-icon name="flash" class="brand-icon"></ion-icon>
              <span>StudCash</span>
            </div>
          </ion-list-header>
          <ion-note class="role-note">{{ userRole === 'ETUDIANT' ? 'Espace Étudiant' : 'Espace Boutique' }}</ion-note>

          <!-- Student Pages -->
          <ng-container *ngIf="userRole === 'ETUDIANT'">
            <ion-menu-toggle auto-hide="false" *ngFor="let p of studentPages; let i = index">
              <ion-item routerDirection="root" [routerLink]="[p.url]" lines="none" detail="false" routerLinkActive="selected">
                <ion-icon aria-hidden="true" slot="start" [ios]="p.icon + '-outline'" [md]="p.icon + '-sharp'"></ion-icon>
                <ion-label>{{ p.title }}</ion-label>
              </ion-item>
            </ion-menu-toggle>
          </ng-container>

          <!-- Merchant Pages -->
          <ng-container *ngIf="userRole === 'COMMERCANT'">
            <ion-menu-toggle auto-hide="false" *ngFor="let p of merchantPages; let i = index">
              <ion-item routerDirection="root" [routerLink]="[p.url]" lines="none" detail="false" routerLinkActive="selected">
                <ion-icon aria-hidden="true" slot="start" [ios]="p.icon + '-outline'" [md]="p.icon + '-sharp'"></ion-icon>
                <ion-label>{{ p.title }}</ion-label>
              </ion-item>
            </ion-menu-toggle>
          </ng-container>

          <ion-item class="theme-toggle-item" lines="none">
            <ion-icon slot="start" name="moon-outline"></ion-icon>
            <ion-label>Dark Mode</ion-label>
            <ion-toggle slot="end" [checked]="themeService.isDark" (ionChange)="themeService.toggleTheme()"></ion-toggle>
          </ion-item>
        </ion-list>
      </ion-content>

      <div class="logout-section">
        <ion-menu-toggle auto-hide="false">
          <ion-item button (click)="logout()" lines="none" class="logout-btn">
            <ion-icon slot="start" name="log-out-outline" color="danger"></ion-icon>
            <ion-label color="danger">Déconnexion</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </div>
    </ion-menu>
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
